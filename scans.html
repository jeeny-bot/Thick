    html, body {

        /* [기존 스타일 유지] */
        :root {
            --orange-main: #e67e22;
            --orange-dark: #c15817;
            --white: #ffffff;
            --bg-gray: #fff4ed;
            --text: #391f0d;
            --surface: rgba(255,255,255,0.9);
            --card-radius: 44px;
            --item-radius: 12px;
        }
        .dark-mode {
            --bg-gray: #000000;
            --black-card: #111111;
            --text: #ffffff;
            --surface: rgba(17,17,17,0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
              background-color: var(--bg-gray);
              color: var(--text);
              margin: 0;
             }



        /* 랜딩 페이지 추가 스타일 */
        #landing-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; color: white; padding: 24px;

        }
        .hero-logo { border: 4px solid white; padding: 4px 18px; font-weight: 900; font-size: 2.5rem; margin-bottom: 30px; }
        .hero-title { font-size: 3.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1.5px; }
        .hero-title span { color: var(--orange-main); }
        .hero-desc { font-size: 1.1rem; opacity: 0.8; line-height: 1.6; margin-bottom: 50px; }
        .btn-start {
            background: var(--orange-main); color: white; border: none;
            width: 100%; max-width: 300px; padding: 20px; border-radius: 20px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.4);
        }
        .back-button {
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.9);
            color: #111;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;

        .back-button:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,1);
        }

        .container {
          width: 100%;
          margin: 0 auto;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 16px;
          opacity: 0;
          transition: opacity 0.5s;
         }

        .scanner-card {
            background-color: var(--black-card);
            border-radius: var(--card-radius);
            padding: 24px;
            color: var(--white);
            display: flex;
            flex-direction: column;
            height: 280px;   /* 👈 고정 높이로 변경 */
        }
        .btn-google {
            background: var(--surface);
            color: var(--text);
        }
        .back-button {
            background: var(--surface);
            color: var(--text);
            border-color: rgba(255,255,255,0.15);
        }

        .scanner-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-box {
            border: 2px solid #555;
            padding: 2px 10px;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 500;
        }

        .scanner-viewport {
             flex: 1;
             background: #0d0d0d;
             border-radius: 12px;
             overflow: hidden;
             position: relative;
             display: flex;
             align-items: center;
             justify-content: center;
             border: 1px solid #222;
             height: 220px;   /* 추가 */
          }

        
        #reader {
            width: 100% !important;
          }
             #reader video {
             width: 100% !important;
             height: 100% !important;
             object-fit: contain !important;
          }

        
        .viewport-border-overlay {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none; z-index: 10;
        }

        .camera-reticle {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 15;
        }

        .reticle-box { width: 65%; height: 45%; position: relative; }
        .reticle-box::before, .reticle-box::after, .reticle-box span::before, .reticle-box span::after {
            content: ''; position: absolute; width: 25px; height: 25px; border-color: #fff; border-style: solid;
        }
        .reticle-box::before { top: -4px; left: -4px; border-width: 5px 0 0 5px; }
        .reticle-box::after { top: -4px; right: -4px; border-width: 5px 5px 0 0; }
        .reticle-box span::before { bottom: -4px; left: -4px; border-width: 0 0 5px 5px; }
        .reticle-box span::after { bottom: -4px; right: -4px; border-width: 0 5px 5px 0; }

        .scanner-tip-text { text-align: center; margin-top: 18px; font-size: 1rem; font-weight: 500; opacity: 0.95; letter-spacing: -0.5px; }

        .cart-card {
            background-color: var(--orange-main);
            border-radius: var(--card-radius);
            padding: 24px;
            color: var(--white);
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);

        .cart-header-row { font-size: 1.5rem; font-weight: 500; margin-bottom: 16px; padding-left: 8px; }
        .cart-items-list { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-bottom: 5px; }

        .item-row { display: flex; gap: 10px; min-height: 56px; }
        .item-info-card { background-color: var(--white); border-radius: var(--item-radius); padding: 0 18px; display: flex; align-items: center; color: #000; flex: 1; justify-content: space-between; }
        .item-name-label { font-weight: 700; font-size: 0.8rem; flex: 1.1; word-break: keep-all; line-height: 1.2; }
        .item-price-label { font-weight: 900; font-size: 0.85rem; flex: 1; text-align: center; line-height: 1.2; }
        .item-qty-label { display: flex; align-items: center; gap: 2px; font-weight: 700; font-size: 0.8rem; justify-content: flex-end; flex: 0.7; color: #444; }
        .qty-control-btn { background: none; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; color: #000; padding: 0 6px; }
        .item-compare-link { background-color: var(--white); border-radius: var(--item-radius); min-width: 90px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #000; font-weight: 900; font-size: 0.8rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); padding: 0 8px; }

        .summary-footer { background-color: var(--black-card); border-radius: 15px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .summary-title { font-weight: 900; font-size: 0.8rem; color: #fff; }
        .summary-value { flex: 1; text-align: right; margin-right: 8px; font-weight: 900; font-size: 1rem; color: #fff; }
        .btn-checkout { background-color: var(--white); color: #000; border: none; border-radius: 8px; padding: 5px 12px; font-weight: 900; font-size: 0.8rem; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 20000; }
        .modal-card { background: var(--white); width: 90%; max-width: 400px; border-radius: 30px; padding: 30px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .modal-title { color: #000; font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .modal-input-group { display: flex; flex-direction: column; gap: 8px; }
        .modal-label { color: #666; font-size: 0.9rem; font-weight: 700; margin-left: 5px; }
        .modal-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 1.1rem; font-weight: 700; outline: none; transition: border-color 0.3s; }
        .modal-input:focus { border-color: var(--orange-main); }
        .modal-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .btn-save { background: var(--orange-main); color: #fff; }
        .btn-cancel { background: #eee; color: #666; }
        .qty-num { font-size: 0.75rem; color: var(--orange-main); margin-left: 3px; font-weight: 800; }
        
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        .toast-notification { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: #fff; padding: 14px 40px; border-radius: 50px; font-weight: 900; z-index: 10000; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); white-space: nowrap; }
        .empty-cart-msg { text-align: center; margin-top: 40%; opacity: 0.8; font-weight: 700; color: #fff; }
    </style>

<body>
    <section id="landing-page">

    <div id="manual-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 class="modal-title">📦 신규 상품 등록</h2>
            <div class="modal-input-group">
                <span class="modal-label">바코드</span>
                <input type="text" id="manual-barcode" class="modal-input" readonly style="background:#f9f9f9; color:#999;">
            </div>
            <div class="modal-input-group">
                <span class="modal-label">상품명</span>
                <input type="text" id="manual-name" class="modal-input" placeholder="상품 이름을 입력하세요">
            </div>
            <div class="modal-input-group">
                <span class="modal-label">판매 가격 (원)</span>
                <input type="number" id="manual-price" class="modal-input" placeholder="0" inputmode="numeric">
            </div>
            <div class="modal-btn-group">
                <button class="modal-btn btn-cancel" onclick="closeManualModal()">취소</button>
                <button class="modal-btn btn-save" onclick="saveManualEntry()">저장 후 담기</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification hidden"></div>

    <script>
        // Firebase 설정을 firebase-config.js에서 불러옵니다.
        const firebaseConfig = window.firebaseConfig;
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'landing.html';
            }
        });

        let cart = [];
        let html5QrCode = null;
        let isModalOpen = false;

        async function initScanner() {
            try {
                if (html5QrCode) {
                    try { await html5QrCode.stop(); } catch (e) {}
                }
                html5QrCode = new Html5Qrcode("reader");
                const cameras = await Html5Qrcode.getCameras();
                if (cameras && cameras.length) {
                    const backCamera = cameras[cameras.length - 1];
                    await html5QrCode.start(
                        backCamera.id,
                        { fps: 10, qrbox: { width: 300, height: 300 } },
                        (decodedText) => { onScanSuccess(decodedText); }
                    );
                }
            } catch (err) {
                showToast("카메라 권한을 확인하세요.");
            }
        }

        // 스캔 성공 시 항상 모달을 엽니다.
        function onScanSuccess(barcode) {
            if (isModalOpen) return;
            // 짧은 시간 내 동일 바코드 스캔 방지
            if (cart.length > 0 && cart.some(item => item.barcode === barcode && (Date.now() - item.updatedAt < 2000))) return;

            if (navigator.vibrate) navigator.vibrate(80);
            openManualModal(barcode);
        }

        // 모달을 열고, DB에서 상품 정보를 조회하여 자동으로 채웁니다.
        async function openManualModal(barcode) {
            isModalOpen = true;
            document.getElementById('manual-modal').classList.remove('hidden');
            
            const nameInput = document.getElementById('manual-name');
            const priceInput = document.getElementById('manual-price');

            // 1. 입력 필드 초기화 및 바코드 값 설정
            document.getElementById('manual-barcode').value = barcode;
            nameInput.value = "";
            priceInput.value = "";
            nameInput.focus();

            showToast(`바코드 ${barcode} 조회중...`);

            // 2. DB에서 바코드 정보 조회
            const productInfo = await window.findProductInSessions(barcode);

            // 3. 정보가 있으면 필드에 값 채우기
            if (productInfo) {
                nameInput.value = productInfo.name;
                priceInput.value = productInfo.price;
                showToast(`✅ 이전 기록을 불러왔습니다.`);
            } else {
                showToast(`ℹ️ 처음 보는 상품입니다.`);
            }
        }

        function closeManualModal() {
            isModalOpen = false;
            document.getElementById('manual-modal').classList.add('hidden');
        }

        // 모달에서 입력된 정보로 장바구니에 아이템 추가 (DB 직접 수정 X)
        function saveManualEntry() {
            const barcode = document.getElementById('manual-barcode').value;
            const name = document.getElementById('manual-name').value.trim();
            const price = parseInt(document.getElementById('manual-price').value) || 0;

            if (!name || price <= 0) { 
                alert("상품명과 가격을 정확히 입력해주세요!"); 
                return; 
            }

            addToCart(barcode, { name, price });
            closeManualModal();
            showToast("장바구니에 추가되었습니다! ✅");
        }

        function addToCart(barcode, productInfo) {
            const existing = cart.find(item => item.barcode === barcode);
            if (existing) {
                existing.qty += 1;
                existing.updatedAt = Date.now();
            } else {
                cart.unshift({
                    id: Date.now(),
                    updatedAt: Date.now(),
                    barcode: barcode,
                    name: productInfo.name,
                    price: productInfo.price,
                    qty: 1
                });
            }
            render();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                item.updatedAt = Date.now();
                if (item.qty < 1) cart = cart.filter(i => i.id !== id);
            }
            render();
        }

        function render() {
            const listEl = document.getElementById('cart-list');
            const countEl = document.getElementById('cart-item-count');
            const totalValEl = document.getElementById('total-val');
            if (!listEl) return;
            if (cart.length === 0) {
                listEl.innerHTML = '<div class="empty-cart-msg">바코드를 스마트폰 렌즈에 비춰주세요.</div>';
                countEl.innerText = "0";
                totalValEl.innerText = "0";
                return;
            }
            listEl.innerHTML = cart.map(item => `
                <div class="item-row">
                    <div class="item-info-card">
                        <span class="item-name-label">${item.name}</span>
                        <span class="item-price-label">
                            ${(item.price * item.qty).toLocaleString()}원
                            <span class="qty-num">${item.qty}</span>
                        </span>
                        <div class="item-qty-label">
                            <button class="qty-control-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            /
                            <button class="qty-control-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <a href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent(item.name)}" target="_blank" class="item-compare-link">가격비교</a>
                </div>
            `).join('');
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            totalValEl.innerText = total.toLocaleString();
            countEl.innerText = cart.length;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        window.addEventListener('load', () => {
            render();
        });
    </script>
    <script src="firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
          getFirestore, 
          collection, 
          addDoc, 
          serverTimestamp,
          query,
          orderBy,
          limit,
          getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        import {
          getAuth,
          onAuthStateChanged,
          signInWithPopup,
          GoogleAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Firebase 설정을 firebase-config.js에서 불러옵니다.
        const firebaseConfig = window.firebaseConfig;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        function applySavedDarkMode() {
            const enabled = localStorage.getItem('thick_dark_mode') === '1';
            document.body.classList.toggle('dark-mode', enabled);
        }
        applySavedDarkMode();

        window.loginWithGoogle = async function () {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error("❌ 로그인 실패:", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUid = user.uid;
                document.getElementById('landing-page').classList.add('hidden');
                document.getElementById('app-container').style.opacity = '1';
                render();
            } else {
                window.currentUid = null;
                document.getElementById('landing-page').style.transform = 'translateY(0)';
                document.getElementById('landing-page').classList.remove('hidden');
                document.getElementById('app-container').style.opacity = '0';

            }
        });
        
        // 세션 기록에서 바코드를 찾는 함수
        window.findProductInSessions = async function(barcode) {
            if (!window.currentUid) return null;

            const sessionsRef = collection(db, "users", window.currentUid, "sessions");
            const q = query(sessionsRef, orderBy("createdAt", "desc"), limit(50)); // 성능을 위해 최근 50개 세션만 조회

            try {
                const querySnapshot = await getDocs(q);
                for (const doc of querySnapshot.docs) {
                    const items = doc.data().items || [];
                    const foundItem = items.find(item => item.barcode === barcode);
                    if (foundItem) {
                        return { name: foundItem.name, price: foundItem.price }; // 찾으면 이름과 가격 정보 반환
                    }
                }
            } catch (e) {
                console.error("세션 조회 실패: ", e);
            }
            return null; // 모든 세션을 조회해도 없으면 null 반환
        }

        // 현재 장바구니를 세션으로 저장하는 함수
        let savedLocation = null;

        window.captureLocation = function() {
            if (!navigator.geolocation) {
                showToast('위치 정보가 지원되지 않는 브라우저입니다.');
                return;
            }

            showToast('위치 정보를 가져오는 중...');
            navigator.geolocation.getCurrentPosition((pos) => {
                savedLocation = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };
                showToast('위치가 저장되었습니다. (지도 공유용)');
            }, (err) => {
                console.error('위치 수집 실패:', err);
                showToast('위치 정보 수집에 실패했습니다. 권한을 허용해주세요.');
            }, {
                enableHighAccuracy: true,
                timeout: 10000
            });
        };

        window.finishSession = async function() {
            if (!window.currentUid || cart.length === 0) {
                window.location.href = "dashboard.html";
                return;
            }

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            const storeName = document.getElementById('store-name')?.value || '';

            if (!savedLocation) {
                showToast('위치 정보가 없으면 공유 지도에 표시되지 않습니다.');
            }

            try {
                await addDoc(
                    collection(db, "users", window.currentUid, "sessions"),
                    {
                        items: cart,
                        totalPrice: total,
                        storeName: storeName,
                        location: savedLocation,
                        createdAt: serverTimestamp()
                    }
                );

                showToast("구매 기록이 저장되었습니다 ✔");

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 2000);

            } catch (e) {
                console.error("❌ 세션 저장 실패:", e);
                showToast("저장 실패. 다시 시도해주세요.");
            }
        };
      </script>
     

      <script>
function isInAppBrowser() {
  const ua = navigator.userAgent;
  return /KAKAOTALK|NAVER|Instagram|FBAN|FBAV/i.test(ua);
}
function isIOS() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (isInAppBrowser()) {
  alert("로그인이 안될 경우, 오른쪽 상단 메뉴에서 '브라우저로 열기'를 눌러주세요.");
}
function startScanner() {
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isIOS) {
        startIOSQuagga();
    } else {
        initScanner(); // 안드로이드는 기존 html5-qrcode 유지
    }
}
function startIOSQuagga() {

const reader = document.getElementById("reader");
reader.innerHTML = "";

const viewport = document.createElement("div");
viewport.style.width = "100%";
viewport.style.height = "340px";
viewport.style.position = "relative";

reader.appendChild(viewport);

Quagga.init({
    inputStream: {
        type: "LiveStream",
        target: viewport,
        constraints: {
            facingMode: "environment",
             width: { ideal: 1920 },
             height: { ideal: 1080 }
        }
    },
    locator: {
         patchSize: "medium",
         halfSample: false
    },
    numOfWorkers: 0,
    frequency: 30,
    decoder: {
        readers: [
        "ean_reader",
        "ean_8_reader"
    ]
    },
         
    locate: false
}, function (err) {
    if (err) {
        showToast("카메라 시작 실패");
        return;
    }
    Quagga.start();
});

let scanBuffer = {};
let scanThreshold = 2; // 3번 연속 감지되어야 인정

Quagga.onDetected(function (result) {

    if (!result || !result.codeResult || !result.codeResult.code) return;

    const code = result.codeResult.code;

    if (!scanBuffer[code]) {
        scanBuffer[code] = 1;
    } else {
        scanBuffer[code]++;
    }

    // 3번 이상 연속 감지되면 성공 처리
    if (scanBuffer[code] >= scanThreshold && code.length >= 8) {

        // 버퍼 초기화
        scanBuffer = {};

        onScanSuccess(code);
    }
});

}
</script>
