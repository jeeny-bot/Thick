<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thick - 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
    <style>
        :root {
            --bg-gray: #fff3ec;
            --white: #ffffff;
            --surface: rgba(255,255,255,0.95);
            --text: #37250a;
            --text-muted: rgba(55,37,16,0.66);
            --border: rgba(185,130,75,0.35);
            --card-radius: 20px;
            --accent: #e67e22;
        }
        .dark-mode {
            --bg-gray: #000000;
            --white: #111111;
            --surface: rgba(17,17,17,0.95);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --border: rgba(255,255,255,0.18);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: var(--bg-gray);
            color: var(--text);
            padding: 24px;
            padding-bottom: 180px; /* 하단 메뉴 공간 확보 */
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        .bottom-menu {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 18px 24px 28px;
            background: var(--surface);
            box-shadow: 0 -12px 24px rgba(0,0,0,0.1);
            border-top: 1px solid rgba(0,0,0,0.08);
        }
        .bottom-menu .card {
            margin: 0 auto;
            max-width: 480px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 0;
        }
        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
        }
        .dark-mode-toggle {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 14px;
            padding: 8px 12px;
            color: #111;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .dark-mode-toggle:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,1);
        }
        .dark-mode .dark-mode-toggle {
            background: rgba(17,17,17,0.9);
            color: #ffffff;
            border-color: rgba(255,255,255,0.15);
        }
        .dark-mode .dark-mode-toggle:hover {
            background: rgba(17,17,17,1);
        }
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .link-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .link-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 22px;
            color: var(--text);
            font-size: 1.26rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .link-button:hover {
            transform: translateY(-2px);
            background: var(--white);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }
        .link-button::before {
            content: '';
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(230,126,34,0.15);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .link-button[data-icon="report"]::before { content: "📊"; }
        .link-button[data-icon="map"]::before { content: "🗺️"; }
        .link-button[data-icon="product"]::before { content: "📦"; }
        .link-button[data-icon="share"]::before { content: "🤝"; }
        .link-button[data-icon="price"]::before { content: "💰"; }
        .logout-btn {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 14px;
            padding: 8px 16px;
            color: #111;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .logout-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,1);
        }
        .dark-mode .logout-btn {
            background: rgba(17,17,17,0.9);
            color: #ffffff;
            border-color: rgba(255,255,255,0.15);
        }
        .dark-mode .logout-btn:hover {
            background: rgba(17,17,17,1);
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>THICK</h1>
                <p>상품을 스캔해서 등록하세요</p>
            </div>
            <div class="header-buttons">
                <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
                <button class="logout-btn" onclick="logout()">로그아웃</button>
            </div>
        </div>

        <div class="footer">
            <p></p>
            <p><a class="link-button" href="scans.html" data-icon="product" style="justify-content: center;">상품 스캔하기</a></p>
        </div>
    </div>

    <div class="bottom-menu">
        <div class="card">
            <h2>내 메뉴</h2>
            <div class="link-grid">
                <a class="link-button" href="report.html" data-icon="report">리포트 보기</a>
                <a class="link-button" href="product_info.html?barcode=690348777139" data-icon="product">상품 정보</a>
                <a class="link-button" href="map.html" data-icon="map">판매점 지도</a>
                <a class="link-button" href="share.html" data-icon="share">상품 공유</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase 설정을 firebase-config.js에서 불러옵니다.
        const firebaseConfig = window.firebaseConfig;

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'landing.html';
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            }).catch((error) => {
                console.error('Logout error:', error);
                alert('로그아웃 중 오류가 발생했습니다.');
            });
        }

        function setDarkMode(enabled) {
            document.body.classList.toggle('dark-mode', enabled);
            const button = document.querySelector('.dark-mode-toggle');
            if (enabled) {
                button.textContent = '☀️';
                localStorage.setItem('thick_dark_mode', '1');
            } else {
                button.textContent = '🌙';
                localStorage.removeItem('thick_dark_mode');
            }
        }

        function toggleDarkMode() {
            const enabled = !document.body.classList.contains('dark-mode');
            setDarkMode(enabled);
        }

        function applySavedDarkMode() {
            const enabled = localStorage.getItem('thick_dark_mode') === '1';
            setDarkMode(enabled);
        }

        applySavedDarkMode();
    </script>
</body>
</html>
