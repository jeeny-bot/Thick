
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>상품 스캔</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg-main: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --orange-main: #e67e22;
            --item-bg: #333;
            --card-radius: 24px;
            --item-radius: 12px;
        }

        body {
            margin: 0;
            background-color: var(--bg-main);
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            padding-bottom: 80px;
        }

        .container {
            padding: 16px;
        }

        .scanner-card {
            background-color: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: 16px;
        }

        #reader {
            width: 100%;
            border-radius: var(--item-radius);
            overflow: hidden;
            border: 1px solid #333;
        }

        .cart-card {
            background-color: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 24px;
        }

        .cart-header-row {
            font-size: 1.2rem; 
            font-weight: 700; 
            margin-bottom: 16px;
        }
        
        .cart-items-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .item-row {
            display: flex; 
            align-items: center;
            gap: 10px; 
            background-color: var(--item-bg);
            padding: 12px;
            border-radius: var(--item-radius);
        }
        .item-name-label { flex-grow: 1; font-weight: 500; }
        .item-qty-label { display: flex; align-items: center; gap: 8px; }
        .qty-control-btn { background: none; border: 1px solid #555; color: var(--text-main); border-radius: 50%; width: 24px; height: 24px; font-size: 1rem; cursor: pointer; }
        .item-price-label { font-weight: 700; min-width: 80px; text-align: right; }

        .summary-footer {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 16px;
            padding: 16px;
            background-color: #252525;
            border-radius: var(--item-radius);
        }
        .summary-title { font-weight: 700; }
        .summary-value { font-size: 1.2rem; font-weight: 900; color: var(--orange-main); }
        .btn-checkout {
            background-color: var(--orange-main); 
            color: var(--text-main);
            border: none; 
            border-radius: 8px;
            padding: 12px 20px; 
            font-weight: 700; 
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            background-color: #1e1e1e;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.4);
            padding: 10px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            text-decoration: none;
            flex: 1;
        }
        .nav-item.active { color: var(--orange-main); }
        .nav-item .icon { font-size: 1.5rem; margin-bottom: 4px; }

        /* Modal Styles */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); display: flex; 
            align-items: center; justify-content: center; z-index: 200; 
        }
        .modal-card {
            background: var(--card-bg);
            width: 90%; max-width: 400px; border-radius: 24px; 
            padding: 24px;
        }
        .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px;}
        .modal-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: #333; color: var(--text-main); margin-bottom: 12px; }
        .modal-btn-group { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .btn-save { background: var(--orange-main); color: var(--text-main); }
        .btn-cancel { background: #444; color: var(--text-sub); }
        .hidden { display: none; }

    </style>
</head>

<body>
    <div class="container" id="app-container">
        <section class="scanner-card">
            <div id="reader"></div>
        </section>

        <section class="cart-card">
            <div class="cart-header-row">쇼핑 내역</div>
            <div id="cart-list" class="cart-items-list">
                <p style="text-align:center; color: var(--text-sub); padding: 20px 0;">상품 바코드를 스캔하세요.</p>
            </div>
            <div class="summary-footer">
                <div>
                    <span class="summary-title">총 합계</span>
                    <div class="summary-value"><span id="total-val">0</span>원</div>
                </div>
                <button class="btn-checkout" onclick="finishSession()">등록 완료</button>
            </div>
        </section>
    </div>

    <div id="manual-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 class="modal-title">신규 상품 등록</h2>
            <input type="text" id="manual-barcode" class="modal-input" readonly>
            <input type="text" id="manual-name" class="modal-input" placeholder="상품명">
            <input type="number" id="manual-price" class="modal-input" placeholder="가격 (원)">
            <input type="text" id="manual-image-url" class="modal-input" placeholder="이미지 URL (선택)">
            <div class="modal-btn-group">
                <button class="modal-btn btn-cancel" onclick="closeManualModal()">취소</button>
                <button class="modal-btn btn-save" onclick="saveManualEntry()">저장</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><div class="icon">&#127968;</div><div>홈</div></a>
        <a href="scan.html" class="nav-item active"><div class="icon">&#10133;</div><div>상품등록</div></a>
        <a href="#" class="nav-item"><div class="icon">&#128220;</div><div>내역</div></a>
        <a href="report.html" class="nav-item"><div class="icon">&#128202;</div><div>리포트</div></a>
        <a href="settings.html" class="nav-item"><div class="icon">&#9881;</div><div>설정</div></a>
    </nav>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6Ws2dXPrMqUQTwVbGDdcAhdKJzJK1Cmk",
            authDomain: "thick-fdd38.firebaseapp.com",
            projectId: "thick-fdd38",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;

        let cart = [];
        let html5QrCode;
        let isModalOpen = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid;
                initScanner();
            } else {
                window.location.href = "index.html";
            }
        });

        function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess).catch(err => {
                console.error("Scanner start failed: ", err);
            });
        }

        async function onScanSuccess(decodedText, decodedResult) {
            if (isModalOpen) return;
            html5QrCode.pause();
            
            const product = await findProductInSessions(decodedText);
            if (product) {
                addToCart(decodedText, product);
                setTimeout(() => html5QrCode.resume(), 500);
            } else {
                openManualModal(decodedText);
            }
        }

        function openManualModal(barcode) {
            isModalOpen = true;
            document.getElementById('manual-modal').classList.remove('hidden');
            document.getElementById('manual-barcode').value = barcode;
            document.getElementById('manual-name').value = '';
            document.getElementById('manual-price').value = '';
            document.getElementById('manual-image-url').value = '';
            document.getElementById('manual-name').focus();
        }

        function closeManualModal() {
            isModalOpen = false;
            document.getElementById('manual-modal').classList.add('hidden');
            html5QrCode.resume();
        }

        function saveManualEntry() {
            const barcode = document.getElementById('manual-barcode').value;
            const name = document.getElementById('manual-name').value.trim();
            const price = parseInt(document.getElementById('manual-price').value);
            const imageUrl = document.getElementById('manual-image-url').value.trim();
            
            if (name && price > 0) {
                addToCart(barcode, { name, price, imageUrl });
                closeManualModal();
            } else {
                alert('상품명과 가격을 올바르게 입력해주세요.');
            }
        }

        function addToCart(barcode, productInfo) {
            const existingItem = cart.find(item => item.barcode === barcode);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...productInfo, barcode, qty: 1 });
            }
            renderCart();
        }

        function updateQty(barcode, delta) {
            const item = cart.find(i => i.barcode === barcode);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.barcode !== barcode);
                }
            }
            renderCart();
        }

        function renderCart() {
            const listEl = document.getElementById('cart-list');
            const totalValEl = document.getElementById('total-val');
            
            if (cart.length === 0) {
                listEl.innerHTML = '<p style="text-align:center; color: var(--text-sub); padding: 20px 0;">상품 바코드를 스캔하세요.</p>';
                totalValEl.textContent = '0';
                return;
            }

            listEl.innerHTML = cart.map(item => `
                <div class="item-row">
                    <span class="item-name-label">${item.name}</span>
                    <div class="item-qty-label">
                        <button class="qty-control-btn" onclick="window.updateQty('${item.barcode}', -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-control-btn" onclick="window.updateQty('${item.barcode}', 1)">+</button>
                    </div>
                    <span class="item-price-label">${(item.price * item.qty).toLocaleString()}원</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            totalValEl.textContent = total.toLocaleString();
        }

        async function finishSession() {
            if (!currentUid || cart.length === 0) {
                alert("저장할 상품이 없습니다.");
                return;
            }
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            try {
                await addDoc(collection(db, "users", currentUid, "sessions"), {
                    items: cart,
                    totalPrice: total,
                    createdAt: serverTimestamp()
                });
                alert("구매 내역이 저장되었습니다.");
                window.location.href = "dashboard.html";
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("저장에 실패했습니다.");
            }
        }

        async function findProductInSessions(barcode) {
            if (!currentUid) return null;
            const sessionsRef = collection(db, "users", currentUid, "sessions");
            const q = query(sessionsRef, orderBy("createdAt", "desc"), limit(50));

            const querySnapshot = await getDocs(q);
            for (const doc of querySnapshot.docs) {
                const items = doc.data().items || [];
                const foundItem = items.find(item => item.barcode === barcode);
                if (foundItem) {
                    return { name: foundItem.name, price: foundItem.price, imageUrl: foundItem.imageUrl };
                }
            }
            return null;
        }

        // Make functions globally available
        window.updateQty = updateQty;
        window.finishSession = finishSession;
        window.saveManualEntry = saveManualEntry;
        window.closeManualModal = closeManualModal;
    </script>

</body>
</html>
