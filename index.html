<!DOCTYPE html>
<html lang="ko">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TZ5LFV948V"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-TZ5LFV948V');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>띡! Thick - Smart Scanner Pro</title>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* [기존 스타일 유지] */
        :root {
            --orange-main: #e67e22;
            --black-card: #000000;
            --white: #ffffff;
            --bg-gray: #f2f2f7;
            --card-radius: 44px;
            --item-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-gray);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* [추가: 랜딩 페이지 스타일] */
        #landing-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--black-card);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .landing-logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--white);
            margin-bottom: 20px;
        }

        .landing-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .landing-desc {
            font-size: 1rem;
            color: #888;
            margin-bottom: 50px;
            line-height: 1.6;
            word-break: keep-all;
        }

        .btn-login-google {
            background-color: var(--white);
            color: #000;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        .btn-start-service {
            background-color: var(--orange-main);
            color: var(--white);
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            display: none; /* 로그인 전까지 숨김 */
        }

        /* [서비스 컨테이너 - 로그인 전까지 숨김] */
        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: none; /* 수정: 초기값 숨김 */
            flex-direction: column;
            padding: 16px;
            gap: 16px;
        }

        /* --- 상단: 스캐너 카드 (디자인 유지) --- */
        .scanner-card {
            background-color: var(--black-card);
            border-radius: var(--card-radius);
            padding: 24px;
            color: var(--white);
            display: flex;
            flex-direction: column;
            height: 42%;
            min-height: 280px;
            position: relative;
        }

        .scanner-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-box {
            border: 2px solid #555;
            padding: 2px 10px;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 500;
        }

        .scanner-viewport {
            flex: 1;
            background: #0d0d0d;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .viewport-border-overlay {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 10;
        }

        .camera-reticle {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 15;
        }

        .reticle-box { width: 65%; height: 45%; position: relative; }
        .reticle-box::before, .reticle-box::after, .reticle-box span::before, .reticle-box span::after {
            content: ''; position: absolute; width: 25px; height: 25px; border-color: #fff; border-style: solid;
        }
        .reticle-box::before { top: -4px; left: -4px; border-width: 5px 0 0 5px; }
        .reticle-box::after { top: -4px; right: -4px; border-width: 5px 5px 0 0; }
        .reticle-box span::before { bottom: -4px; left: -4px; border-width: 0 0 5px 5px; }
        .reticle-box span::after { bottom: -4px; right: -4px; border-width: 0 5px 5px 0; }

        .scanner-tip-text {
            text-align: center; margin-top: 18px; font-size: 1rem;
            font-weight: 500; opacity: 0.95; letter-spacing: -0.5px;
        }

        /* --- 하단: 장바구니 카드 (디자인 유지) --- */
        .cart-card {
            background-color: var(--orange-main);
            border-radius: var(--card-radius);
            padding: 24px;
            color: var(--white);
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .cart-header-row {
            font-size: 1.5rem; font-weight: 500; margin-bottom: 16px; padding-left: 8px;
        }

        .cart-items-list {
            flex: 1; display: flex; flex-direction: column; gap: 12px;
            overflow-y: auto; padding-bottom: 5px;
        }

        .item-row { display: flex; gap: 10px; min-height: 56px; }

        .item-info-card {
            background-color: var(--white); border-radius: var(--item-radius);
            padding: 0 18px; display: flex; align-items: center; color: #000;
            flex: 1; justify-content: space-between;
        }

        .item-name-label { font-weight: 700; font-size: 0.6rem; flex: 1.1; word-break: keep-all; line-height: 1.2; }
        .item-price-label { font-weight: 900; font-size: 0.7rem; flex: 1; text-align: center; line-height: 1.2; }
        .item-qty-label { display: flex; align-items: center; gap: 2px; font-weight: 700; font-size: 0.7rem; justify-content: flex-end; flex: 0.7; color: #444; }
        .qty-control-btn { background: none; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; color: #000; padding: 0 6px; }

        .item-compare-link {
            background-color: var(--white); border-radius: var(--item-radius);
            min-width: 90px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #000; font-weight: 900; font-size: 0.8rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); padding: 0 8px;
        }

        .summary-footer {
            background-color: var(--black-card); border-radius: 15px; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between; margin-top: 15px;
        }

        .summary-title { font-weight: 900; font-size: 0.7rem; color: #fff; }
        .summary-value { flex: 1; text-align: right; margin-right: 8px; font-weight: 900; font-size: 0.8rem; color: #fff; }
        .btn-checkout { background-color: var(--white); color: #000; border: none; border-radius: 8px; padding: 5px 12px; font-weight: 900; font-size: 0.7rem; cursor: pointer; }

        /* [모달/토스트 디자인 보존] */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 20000; }
        .modal-card { background: var(--white); width: 90%; max-width: 400px; border-radius: 30px; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .modal-title { color: #000; font-size: 1.4rem; font-weight: 900; text-align: center; }
        .modal-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 1.1rem; font-weight: 700; outline: none; }
        .modal-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .btn-save { background: var(--orange-main); color: #fff; }
        .btn-cancel { background: #eee; color: #666; }
        .qty-num { font-size: 0.75rem; color: var(--orange-main); margin-left: 3px; font-weight: 800; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        .toast-notification { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: #fff; padding: 14px 40px; border-radius: 50px; font-weight: 900; z-index: 10000; white-space: nowrap; }
        .empty-cart-msg { text-align: center; margin-top: 40%; opacity: 0.8; font-weight: 700; color: #fff; }
    </style>
</head>

<body>
    <div id="landing-page">
        <div class="landing-logo">Thick 띡!</div>
        <h1 class="landing-title">마트에서의 고민을 한 번에,<br>스마트 쇼핑 가이드</h1>
        <p class="landing-desc">
            바코드를 찍어 실시간 가격 정보를 확인하고,<br>
            당신의 장바구니를 데이터로 관리하세요.
        </p>
        <button id="btn-login" class="btn-login-google" onclick="login()">Google 계정으로 시작하기</button>
        <button id="btn-start" class="btn-start-service" onclick="startApp()">서비스 바로 시작하기</button>
        <p id="welcome-msg" style="color: #666; margin-top: 20px; font-weight: 500;"></p>
    </div>

    <div class="container" id="main-container">
        <section class="scanner-card">
            <header class="scanner-header">
                <div class="logo-box">III</div>
                <div class="logo-text">Thick 띡!</div>
            </header>
            <div class="scanner-viewport">
                <div id="reader"></div>
                <div class="viewport-border-overlay"></div>
                <div class="camera-reticle">
                    <div class="reticle-box"><span></span></div>
                </div>
            </div>
            <p class="scanner-tip-text">상품을 스캔해주세요</p>
        </section>

        <section class="cart-card">
            <div class="cart-header-row"><span id="cart-item-count">0</span> cart item</div>
            <div id="cart-list" class="cart-items-list">
                <div class="empty-cart-msg">바코드를 비치된 스캐너에 비춰주세요.</div>
            </div>
            <div class="summary-footer">
                <span class="summary-title">금액 합계</span>
                <span class="summary-value"><span id="total-val">0</span>원</span>
                <button class="btn-checkout" onclick="location.reload()">구매 종료</button>
            </div>
        </section>
    </div>

    <div id="manual-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 class="modal-title">미등록 상품 등록</h2>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <input type="text" id="manual-barcode" class="modal-input" placeholder="바코드 번호">
                <input type="number" id="manual-price" class="modal-input" placeholder="가격을 입력하세요" inputmode="numeric">
            </div>
            <div class="modal-btn-group" style="display:flex; gap:10px; margin-top:10px;">
                <button class="modal-btn btn-cancel" onclick="closeManualModal()">취소</button>
                <button class="modal-btn btn-save" onclick="saveManualEntry()">장바구니 담기</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast-notification hidden"></div>

    <script>
        // [Firebase 초기화 - Firebase Studio 설정값 입력 필요]
        const firebaseConfig = {
  apiKey: "AIzaSyB6Ws2dXPrMqUQTwVbGDdcAhdKJzJK1Cmk",
  authDomain: "thick-fdd38.firebaseapp.com",
  projectId: "thick-fdd38",
  storageBucket: "thick-fdd38.firebasestorage.app",
  messagingSenderId: "109235677950",
  appId: "1:109235677950:web:f58eb3bcdfdaea9e3793af",
  measurementId: "G-LH61G4J09W"
};
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 로그인 기능
        function login() {
            auth.signInWithPopup(provider).catch(err => {
                console.error(err);
                showToast("로그인에 실패했습니다.");
            });
        }

        // 로그인 상태 감시
        auth.onAuthStateChanged(user => {
            const loginBtn = document.getElementById('btn-login');
            const startBtn = document.getElementById('btn-start');
            const welcomeMsg = document.getElementById('welcome-msg');

            if (user) {
                loginBtn.style.display = 'none';
                startBtn.style.display = 'inline-block';
                welcomeMsg.innerText = `${user.displayName}님, 준비되셨나요?`;
            } else {
                loginBtn.style.display = 'inline-block';
                startBtn.style.display = 'none';
                welcomeMsg.innerText = '';
            }
        });

        // 서비스 페이지로 전환
        function startApp() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            initScanner(); // 페이지 전환 시 스캐너 시작
        }

        // [이후 모든 로직은 기존 코드와 100% 동일함]
        const PRODUCT_DB = {
            "8801048101037": { name: "신라면 (5개입)", price: 4500 },
            "8801056154018": { name: "칠성사이다 500ml", price: 1800 },
            "8801043014783": { name: "햇반 210g", price: 1500 },
            "88023014": { name: "미등록 제품", price: 12000 }
        };

        let cart = [];
        let html5QrCode = null;
        let isModalOpen = false;

        async function initScanner() {
            try {
                if (html5QrCode) { try { await html5QrCode.stop(); } catch (e) { } }
                html5QrCode = new Html5Qrcode("reader");
                const config = {
                    fps: 20,
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        const width = viewfinderWidth * 0.9;
                        const height = viewfinderHeight * 0.45;
                        return { width, height };
                    },
                    aspectRatio: 1.0,
                    disableFlip: true,
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                };
                await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => onScanSuccess(decodedText));
            } catch (err) {
                console.error(err);
                showToast("카메라 권한을 허용해 주세요.");
            }
        }

        function onScanSuccess(barcode) {
            if (isModalOpen) return;
            const now = Date.now();
            if (cart.length > 0 && cart[0].barcode === barcode && (now - cart[0].updatedAt < 1000)) return;
            if (navigator.vibrate) navigator.vibrate(80);
            const product = PRODUCT_DB[barcode];
            const isUnregistered = !product || (product.name && product.name.includes("미등록"));
            if (!isUnregistered) {
                addToCart(barcode);
                showToast("SUCCESS SCAN!");
            } else {
                openManualModal(barcode);
            }
        }

        function addToCart(barcode, manualInfo = null) {
            if (manualInfo) PRODUCT_DB[barcode] = manualInfo;
            const existing = cart.find(item => item.barcode === barcode);
            if (existing) {
                existing.qty += 1;
                existing.updatedAt = Date.now();
            } else {
                const product = PRODUCT_DB[barcode] || { name: `미등록 (${barcode})`, price: 0 };
                cart.unshift({ id: Date.now(), updatedAt: Date.now(), barcode: barcode, name: product.name, price: product.price, qty: 1 });
            }
            render();
        }

        function openManualModal(barcode) {
            isModalOpen = true;
            document.getElementById('manual-barcode').value = barcode;
            document.getElementById('manual-price').value = "";
            document.getElementById('manual-modal').classList.remove('hidden');
        }

        function closeManualModal() {
            isModalOpen = false;
            document.getElementById('manual-modal').classList.add('hidden');
        }

        function saveManualEntry() {
            const barcode = document.getElementById('manual-barcode').value;
            const price = parseInt(document.getElementById('manual-price').value) || 0;
            addToCart(barcode, { name: "미등록 상품", price: price });
            closeManualModal();
            showToast("상품 등록 완료!");
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                item.updatedAt = Date.now();
                if (item.qty < 1) cart = cart.filter(i => i.id !== id);
            }
            render();
        }

        function render() {
            const listEl = document.getElementById('cart-list');
            const countEl = document.getElementById('cart-item-count');
            const totalValEl = document.getElementById('total-val');
            if (!listEl) return;
            if (cart.length === 0) {
                listEl.innerHTML = '<div class="empty-cart-msg">바코드를 비치된 스캐너에 비춰주세요.</div>';
                countEl.innerText = "0"; totalValEl.innerText = "0";
                return;
            }
            listEl.innerHTML = cart.map(item => `
                <div class="item-row">
                    <div class="item-info-card">
                        <span class="item-name-label">${item.name}</span>
                        <span class="item-price-label">${(item.price * item.qty).toLocaleString()}원<span class="qty-num">${item.qty}</span></span>
                        <div class="item-qty-label">
                            <button class="qty-control-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            / <button class="qty-control-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <a href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent(item.name)}" target="_blank" class="item-compare-link">가격비교</a>
                </div>
            `).join('');
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            totalValEl.innerText = total.toLocaleString();
            countEl.innerText = cart.length;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg; toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        window.addEventListener('load', render);
    </script>
</body>
</html>
