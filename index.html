<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THICK - 스마트 스캐너</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --main-blue: #4A90E2; --bg: #f5f7fa; --text: #333; --accent: #ff9500; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: var(--text); }

        /* [상단 스캐너] */
        #scanner-section { width: 100%; height: 25vh; background: #000; position: relative; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--main-blue); width: 60%; height: 40%; z-index: 10; pointer-events: none; border-radius: 10px; }

        /* [장바구니 헤더] */
        .title { padding: 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 12px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; }

        /* [리스트 영역] */
        main { height: calc(75vh - 160px); overflow-y: auto; padding: 10px; background: var(--bg); }
        .row { display: grid; grid-template-columns: 0.5fr 2fr 1.5fr 1.2fr 1.2fr; gap: 4px; margin-bottom: 8px; align-items: center; }
        .cell { background: var(--main-blue); color: white; padding: 8px 4px; text-align: center; border-radius: 6px; font-size: 11px; min-height: 48px; display: flex; align-items: center; justify-content: center; }
        
        /* 버튼 스타일 */
        .qty-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 4px; width: 20px; height: 20px; font-weight: bold; margin: 0 2px; }
        .comp-btn { background: #34c759; color: white; border: none; border-radius: 4px; padding: 6px 2px; font-size: 10px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; }

        /* [하단 합계] */
        footer { position: fixed; bottom: 0; width: 100%; height: 100px; background: #fff; border-top: 1px solid #ddd; padding: 15px; }
        .summary-row { display: flex; justify-content: center; gap: 15px; }
        .sum-box { background: var(--main-blue); color: white; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; text-align: center; }
    </style>
</head>
<body>

    <div id="scanner-section">
        <video id="video"></video>
        <div class="scan-guide"></div>
    </div>

    <div class="title">
        장바구니 <span class="badge">Price Compare Mode</span>
    </div>

    <main id="list-area">
        <div id="cart-items">
            </div>
    </main>

        const codeReader = new ZXing.BrowserMultiFormatReader();
        let cart = [];

        function startScanner() {
            codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                if (result) {
                    const code = result.getText().trim();
                    const product = LOCAL_DB[code];
                    if (product) {
                        if (navigator.vibrate) navigator.vibrate(50);
                        const existing = cart.find(i => i.code === code);
                        if (existing) existing.qty++;
                        else cart.push({ ...product, code: code, qty: 1 });
                        render();
                    }
                }
            });
        }

        // 🔗 가격비교를 위해 네이버 쇼핑 검색창을 여는 함수
        function openComparison(name) {
            // 상품명을 검색어로 사용하여 네이버 쇼핑 검색 페이지 주소 생성
            const searchQuery = encodeURIComponent(name);
            const url = `https://search.shopping.naver.com/search/all?query=${searchQuery}`;
            window.open(url, '_blank'); // 새 창에서 열기
        }

        function updateQty(code, delta) {
            const item = cart.find(i => i.code === code);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.code !== code);
                render();
            }
        }

        function render() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let tQty = 0; let tPrice = 0;

            cart.forEach((i, idx) => {
                const rowTotal = i.price * i.qty;
                tQty += i.qty; tPrice += rowTotal;

                container.innerHTML += `
                    <div class="row">
                        <div class="cell">${idx + 1}</div>
                        <div class="cell" style="font-size:10px; word-break:break-all;">${i.name}</div>
                        <div class="cell">
                            ${i.qty}
                            <div style="margin-left:5px;">
                                <button class="qty-btn" onclick="updateQty('${i.code}', 1)">+</button>
                                <button class="qty-btn" onclick="updateQty('${i.code}', -1)">-</button>
                            </div>
                        </div>
                        <div class="cell">${rowTotal.toLocaleString()}</div>
                        <div class="cell" style="background:transparent; padding:0;">
                            <button class="comp-btn" onclick="openComparison('${i.name}')">가격비교</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-qty').innerText = tQty;
            document.getElementById('total-price').innerText = tPrice.toLocaleString();
        }

        startScanner();
    </script>
