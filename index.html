<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>띡! THICK - Official App</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        /* [1. 디자인 가이드 고정] */
        :root {
            --brand-blue: #007AFF;
            --deep-black: #0B0B0C;
            --soft-gray: #F2F2F7;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--deep-black); color: var(--white); overflow: hidden; }
        
        /* 헤더 고정 */
        header { padding: 18px 20px; font-weight: 900; font-size: 22px; color: var(--brand-blue); letter-spacing: -1px; }
        
        /* 스캐너 영역 고정 */
        #scanner-box { position: relative; width: 100%; height: 200px; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .scan-line { 
            position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; 
            background: var(--brand-blue); box-shadow: 0 0 15px var(--brand-blue); 
            animation: move 2s infinite ease-in-out; 
        }
        @keyframes move { 0%, 100% { top: 30%; } 50% { top: 70%; } }

        /* 하단 장바구니 영역 고정 */
        main { 
            background: var(--soft-gray); height: calc(100vh - 280px); 
            border-top-left-radius: 35px; border-top-right-radius: 35px; 
            padding: 25px 20px; color: #1c1c1e; overflow-y: auto; 
        }
        .item-card { 
            background: var(--white); padding: 18px; border-radius: 20px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .item-name { font-weight: 800; font-size: 16px; color: #111; }
        .item-sub { font-size: 11px; color: #8e8e93; margin-top: 3px; }

        /* 합계 푸터 고정 */
        footer { 
            position: fixed; bottom: 0; width: 100%; height: 100px; 
            background: var(--white); border-top: 1px solid #eee; 
            padding: 0 25px; display: flex; align-items: center; justify-content: space-between; 
        }
        .total-price { font-size: 28px; font-weight: 900; color: #ff3b30; }
        .btn-check { 
            width: 60px; height: 60px; background: var(--deep-black); 
            color: var(--white); border: none; border-radius: 20px; 
            font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* 영수증 결과창 고정 */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: none; justify-content: center; 
            align-items: center; z-index: 1000; padding: 20px; 
        }
        .receipt-card { 
            background: var(--white); width: 100%; max-width: 400px; 
            border-radius: 30px; padding: 30px; color: #333; text-align: center; 
        }
        .receipt-list { text-align: left; margin: 20px 0; max-height: 250px; overflow-y: auto; border-top: 1px dashed #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <header>THICK</header>

    <div id="scanner-box">
        <video id="video"></video>
        <div class="scan-line"></div>
    </div>

    <main id="list-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
            <b style="font-size:18px;">🛒 구매 목록</b>
            <span onclick="location.reload()" style="color:#8e8e93; font-size:13px; cursor:pointer;">비우기</span>
        </div>
        <div id="cart-list"></div>
    </main>

    <footer>
        <div>
            <small style="color:#8e8e93; font-weight:bold;">총 합계</small>
            <div class="total-price"><span id="total-val">0</span>원</div>
        </div>
        <button class="btn-check" onclick="showReceipt()">✓</button>
    </footer>

    <div id="overlay">
        <div class="receipt-card">
            <h2 style="margin:0;">결제 상세</h2>
            <div id="receipt-items" class="receipt-list"></div>
            <div style="margin-bottom:25px; border-top:1px solid #eee; padding-top:15px;">
                <small style="color:#8e8e93;">최종 금액</small>
                <div style="font-size:32px; font-weight:900; color:#ff3b30;"><span id="final-total">0</span>원</div>
            </div>
            <button onclick="location.reload()" style="width:100%; background:var(--brand-blue); color:white; border:none; padding:18px; border-radius:18px; font-weight:bold; font-size:16px;">새 스캔 시작</button>
        </div>
    </div>

    <script>
        // ⬇️ 여기에 엑셀 수식 결과물을 붙여넣으세요 (3,000줄 이상 가능)
        const LOCAL_DB = {
"01010101": { "name": "천연/발효조미료", "sub": "가공식품>조미료" },
"01010102": { "name": "식초", "sub": "가공식품>조미료" },
"01010103": { "name": "천일염", "sub": "가공식품>조미료" }
            // 여기에 Ctrl+V
        };

        const codeReader = new ZXing.BrowserMultiFormatReader();
        let cart = [];
        let isProcessing = false;

        function init() {
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && !isProcessing) {
                    isProcessing = true;
                    handleScan(result.getText());
                    setTimeout(() => { isProcessing = false; }, 1500); 
                }
            });
        }

        function handleScan(code) {
            const cleanCode = code.trim();
            const product = LOCAL_DB[cleanCode];

            if (product) {
                if (navigator.vibrate) navigator.vibrate(60);
                let item = cart.find(i => i.code === cleanCode);
                if (item) item.qty++;
                else cart.push({ ...product, code: cleanCode, qty: 1, price: 0 });
                render();
            }
        }

        function render() {
            const listEl = document.getElementById('cart-list');
            listEl.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += (i.price * i.qty);
                listEl.innerHTML += `
                    <div class="item-card">
                        <div>
                            <div class="item-name">${i.name}</div>
                            <div class="item-sub">${i.sub}</div>
                        </div>
                        <div style="font-weight:900; color:var(--brand-blue);">${i.qty}개</div>
                    </div>`;
            });
            document.getElementById('total-val').innerText = total.toLocaleString();
            document.getElementById('list-container').scrollTop = 9999;
        }

        function showReceipt() {
            if (cart.length === 0) return alert("상품이 없습니다.");
            codeReader.reset();
            const receiptEl = document.getElementById('receipt-items');
            receiptEl.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += (i.price * i.qty);
                receiptEl.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${i.name} x ${i.qty}</span>
                        <span style="font-weight:bold;">${(i.price * i.qty).toLocaleString()}원</span>
                    </div>`;
            });
            document.getElementById('final-total').innerText = total.toLocaleString();
            document.getElementById('overlay').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
