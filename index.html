<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THICK - Mobile Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --main: #007AFF; --black: #0B0B0C; --bg: #F2F2F7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--black); color: white; overflow: hidden; }
        header { padding: 18px 20px; font-weight: 900; font-size: 22px; color: var(--main); }
        
        /* 스캐너 영역 */
        #scanner-box { position: relative; width: 100%; height: 250px; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { 
            position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; 
            background: var(--main); box-shadow: 0 0 15px var(--main); 
            animation: move 2s infinite ease-in-out; 
        }
        @keyframes move { 0%, 100% { top: 30%; } 50% { top: 70%; } }

        /* 리스트 영역 */
        main { background: var(--bg); height: calc(100vh - 330px); border-radius: 35px 35px 0 0; padding: 25px 20px; color: #1c1c1e; overflow-y: auto; }
        .item-card { background: #fff; padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* 하단 푸터 */
        footer { position: fixed; bottom: 0; width: 100%; height: 100px; background: #fff; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; }
        .total-price { font-size: 26px; font-weight: 900; color: #ff3b30; }
        .btn-check { width: 60px; height: 60px; background: var(--black); color: #fff; border: none; border-radius: 20px; font-size: 28px; }

        /* 에러 메시지 표시용 */
        #status-msg { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #aaa; z-index: 5; }
    </style>
</head>
<body>

    <header>THICK</header>

    <div id="scanner-box">
        <video id="video"></video>
        <div class="scan-line"></div>
        <div id="status-msg">카메라 준비 중...</div>
    </div>

    <main id="scroll-area">
        <div id="cart-list">
            <p style="text-align: center; color: #8e8e93; margin-top: 50px;">바코드를 찍으면<br>여기에 상품이 나타납니다.</p>
        </div>
    </main>

    <footer>
        <div><small style="color:#8e8e93;">합계</small><div class="total-price"><span id="total-val">0</span>원</div></div>
        <button class="btn-check" onclick="location.reload()">↺</button>
    </footer>

    <script>
        const LOCAL_DB = {
            "01010101": { "name": "천연/발효조미료", "sub": "가공식품>조미료" },
            "01010102": { "name": "식초", "sub": "가공식품>조미료" }
            // 여기에 엑셀 데이터 3,000개를 복사해서 넣으세요!
        };

        const codeReader = new ZXing.BrowserMultiFormatReader();
        const videoEl = document.getElementById('video');
        const statusEl = document.getElementById('status-msg');
        let cart = [];

        // 카메라 시작 함수
        async function initScanner() {
            try {
                const videoInputDevices = await codeReader.listVideoInputDevices();
                // 후면 카메라 찾기 (환경에 따라 최적의 카메라 선택)
                const selectedDeviceId = videoInputDevices.length > 1 ? videoInputDevices[1].deviceId : videoInputDevices[0].deviceId;
                
                statusEl.innerText = "스캔 준비 완료";
                
                codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                    if (result) {
                        handleBarcode(result.getText());
                    }
                });
            } catch (error) {
                console.error(error);
                statusEl.innerText = "카메라 에러: HTTPS 연결을 확인하세요.";
                alert("카메라를 켤 수 없습니다. HTTPS 환경인지 확인해주세요.");
            }
        }

        function handleBarcode(code) {
            const cleanCode = code.trim();
            const product = LOCAL_DB[cleanCode];

            if (product) {
                if (navigator.vibrate) navigator.vibrate(50);
                
                let existing = cart.find(i => i.code === cleanCode);
                if (existing) {
                    existing.qty++;
                } else {
                    cart.push({ ...product, code: cleanCode, qty: 1, price: 0 });
                }
                render();
            } else {
                statusEl.innerText = "미등록 상품: " + cleanCode;
            }
        }

        function render() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += (i.price * i.qty);
                list.innerHTML += `
                    <div class="item-card">
                        <div><b>${i.name}</b><br><small style="color:#8e8e93;">${i.sub}</small></div>
                        <div style="font-weight:900; color:var(--main);">${i.qty}개</div>
                    </div>`;
            });
            document.getElementById('total-val').innerText = total.toLocaleString();
            document.getElementById('scroll-area').scrollTop = 9999;
        }

        // 페이지 로드 시 바로 시작
        window.addEventListener('load', initScanner);
    </script>
</body>
</html>
