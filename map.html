<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thick - 판매점 지도</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --bg-gray: #f2f2f7;
            --text-primary: #000000;
            --text-secondary: rgba(0,0,0,0.6);
            --card-radius: 20px;
        }
        .dark-mode {
            --bg-gray: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.65);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .back-button {
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.9);
            color: #111;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            margin-bottom: 16px;
        }
        .back-button:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,1);
        }
        body {
            background-color: var(--bg-gray);
            color: var(--text-primary);
            padding: 20px;
        }
        #map {
            height: 400px;
            width: 100%;
            background-color: #E5E5EA;
            border-radius: var(--card-radius);
            margin-bottom: 20px;
        }
        .store-list-card {
            background-color: var(--white);
            padding: 20px;
            border-radius: var(--card-radius);
        }
        .store-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #E5E5EA;
        }
        .store-item:last-child {
            border-bottom: none;
        }
        .store-info {
            display: flex;
            align-items: center;
        }
        .store-logo {
            width: 40px;
            height: 40px;
            margin-right: 15px;
        }
        .store-name {
            font-size: 17px;
            font-weight: 500;
        }
        .store-price {
            font-size: 17px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='dashboard.html'">뒤로</button>
    <div id="map"></div>
    <div class="store-list-card">
        <div class="store-item">
            <div class="store-info">
                <img src="" alt="CU" class="store-logo">
                <div class="store-name">CU 경산점</div>
            </div>
            <div class="store-price">₩1,500</div>
        </div>
        <div class="store-item">
            <div class="store-info">
                <img src="" alt="GS25" class="store-logo">
                <div class="store-name">GS25 직산점</div>
            </div>
            <div class="store-price">₩1,400</div>
        </div>
        <div class="store-item">
            <div class="store-info">
                <img src="" alt="동네마트" class="store-logo">
                <div class="store-name">동네마트</div>
            </div>
            <div class="store-price">₩980</div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        function applySavedDarkMode() {
            const enabled = localStorage.getItem('thick_dark_mode') === '1';
            document.body.classList.toggle('dark-mode', enabled);
        }
        applySavedDarkMode();
    </script>
</body>
</html>
