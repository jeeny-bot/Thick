<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 로그인 중</title>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #121212; color: #fff; }
        .box { text-align: center; padding: 24px; border-radius: 18px; background: rgba(255,255,255,0.08); }
        .box h1 { margin-bottom: 12px; font-size: 1.4rem; }
        .box p { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="box">
        <h1>카카오 로그인 중...</h1>
        <p>잠시만 기다려주세요.</p>
        <p id="debug" style="font-size:0.8rem; margin-top: 12px; opacity: 0.7;"></p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const debug = document.getElementById('debug');
        debug.textContent = 'code: ' + params.get('code') + ' / error: ' + params.get('error');

        // 현재는 서버 없이 진행하므로, 카카오 로그인 후 콜백에서 바로 대시보드로 이동합니다.
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1200);
    </script>
</body>
</html>
